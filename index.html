<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>行動拉密 多人連線版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    window.FirebaseModules = {
      initializeApp, getApps, getApp, getAuth, signInAnonymously, onAuthStateChanged,
      getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc
    };
    window.dispatchEvent(new Event('firebaseModulesReady'));
  </script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes pulse-ring {
      0% { transform: scale(.8); opacity: 0.5; }
      100% { transform: scale(1.2); opacity: 0; }
    }
    .hint-pulse::before {
      content: ''; display: block; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      border: 4px solid #4ade80; border-radius: inherit; animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }
    .card-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-stone-200 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ==========================================
    // 你的專屬 Firebase 設定 (已自動帶入)
    // ==========================================
    const MY_FIREBASE_CONFIG = {
      apiKey: "AIzaSyB-JKAKg3SRs60w6n4z6QA94V33RCBfvfM",
      authDomain: "rummikub-a2452.firebaseapp.com",
      projectId: "rummikub-a2452",
      storageBucket: "rummikub-a2452.firebasestorage.app",
      messagingSenderId: "944905371953",
      appId: "1:944905371953:web:4318dd2c1274641bffb010",
      measurementId: "G-0M2EJ9FTQ3"
    };

    // --- 遊戲工具函式 ---
    const generateDeck = () => {
      let newDeck = [];
      let idCounter = 1;
      for (let set = 0; set < 2; set++) {
        for (let cIdx = 0; cIdx < 4; cIdx++) {
          for (let value = 1; value <= 13; value++) {
            newDeck.push({ id: idCounter++, colorIdx: cIdx, value, isJoker: false });
          }
        }
      }
      newDeck.push({ id: idCounter++, value: '☻', colorIdx: -1, isJoker: true });
      newDeck.push({ id: idCounter++, value: '☻', colorIdx: -1, isJoker: true });
      for (let i = newDeck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
      }
      return newDeck;
    };

    const COLORS = ['text-red-600', 'text-blue-600', 'text-gray-900', 'text-yellow-600'];
    const BORDER_COLORS = ['border-red-600', 'border-blue-600', 'border-gray-900', 'border-yellow-600'];

    const isValidSet = (tiles) => {
      if (tiles.length < 3) return false;
      const regulars = tiles.filter(t => !t.isJoker);
      if (regulars.length <= 1) return true;
      
      const isGroup = () => {
        if (tiles.length > 4) return false;
        const val = regulars[0].value;
        const colors = new Set();
        for (let t of regulars) {
          if (t.value !== val || colors.has(t.colorIdx)) return false;
          colors.add(t.colorIdx);
        }
        return true;
      };

      const isRun = () => {
        const color = regulars[0].colorIdx;
        if (regulars.some(t => t.colorIdx !== color)) return false;
        for (let start = 1; start <= 14 - tiles.length; start++) {
          let possible = true, tempJokers = tiles.filter(t => t.isJoker).length;
          for (let i = 0; i < tiles.length; i++) {
            let target = start + i;
            if (!tiles.some(t => !t.isJoker && t.value === target)) {
              if (tempJokers > 0) tempJokers--; else { possible = false; break; }
            }
          }
          if (possible) return true;
        }
        return false;
      };
      return isGroup() || isRun();
    };

    const sortTiles = (tiles) => {
      const regulars = tiles.filter(t => !t.isJoker);
      const jokers = tiles.filter(t => t.isJoker);
      if (regulars.length <= 1) return [...regulars, ...jokers];
      if (regulars[0].value === regulars[1].value) return [...regulars.sort((a,b) => a.colorIdx - b.colorIdx), ...jokers];
      return [...regulars.sort((a,b) => a.value - b.value), ...jokers];
    };

    // --- 元件 ---
    const Tile = ({ tile, onClick, isStaged, invalid, isHinted }) => {
      const colorClass = tile.isJoker ? 'text-purple-600' : COLORS[tile.colorIdx];
      const borderClass = tile.isJoker ? 'border-purple-600' : BORDER_COLORS[tile.colorIdx];
      return (
        <div 
          onClick={onClick} 
          className={`relative flex items-center justify-center shrink-0 w-9 h-12 sm:w-11 sm:h-16 bg-white rounded shadow border-2 cursor-pointer font-bold transform transition-transform active:scale-95 ${borderClass} ${isStaged ? 'opacity-40' : ''} ${invalid ? 'bg-red-50' : ''} ${isHinted ? 'ring-2 ring-green-400 hint-pulse' : ''}`}
        >
          <span className={`text-xl sm:text-2xl ${colorClass}`}>{tile.value}</span>
        </div>
      );
    };

    function App({ fbApp }) {
      const { getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } = window.FirebaseModules;
      
      const [user, setUser] = useState(null);
      const [playerName, setPlayerName] = useState('');
      const [roomId, setRoomId] = useState('');
      const [roomData, setRoomData] = useState(null);
      const [gameState, setGameState] = useState('auth');
      const [isProcessing, setIsProcessing] = useState(false);
      const [difficulty, setDifficulty] = useState('medium');
      const [menuError, setMenuError] = useState('');
      const [joinCode, setJoinCode] = useState('');

      const [localHand, setLocalHand] = useState([]);
      const [localBoard, setLocalBoard] = useState([]);
      const [staging, setStaging] = useState([]);
      const [backupHand, setBackupHand] = useState([]);
      const [backupBoard, setBackupBoard] = useState([]);

      const db = useMemo(() => getFirestore(fbApp), [fbApp]);
      const auth = useMemo(() => getAuth(fbApp), [fbApp]);

      useEffect(() => {
        return onAuthStateChanged(auth, (u) => {
          if (u) { setUser(u); setGameState('menu'); }
          else { signInAnonymously(auth).catch(e => setMenuError("系統初始化失敗：" + e.message)); }
        });
      }, [auth]);

      useEffect(() => {
        if (!roomId) return;
        return onSnapshot(doc(db, 'rooms', roomId), (snap) => {
          if (snap.exists()) {
            const data = snap.data();
            setRoomData(data);
            if (data.status === 'playing' && gameState !== 'playing') setGameState('playing');
          } else {
            setGameState('menu');
            setRoomId('');
          }
        }, (err) => setMenuError("連線中斷：" + err.message));
      }, [roomId, db]);

      // 當輪到自己或遊戲開始時，同步本地狀態
      useEffect(() => {
        if (gameState === 'playing' && roomData) {
          const me = roomData.players.find(p => p.id === user.uid);
          if (me) {
            setLocalHand(me.hand);
            setBackupHand(me.hand);
          }
          setLocalBoard(roomData.board);
          setBackupBoard(roomData.board);
          setStaging([]);
        }
      }, [roomData?.turn, gameState === 'playing']);

      const handleCreateRoom = async () => {
        if (!playerName.trim()) { setMenuError("請先輸入暱稱"); return; }
        if (!user) { setMenuError("連線中，請稍候..."); return; }
        
        setIsProcessing(true);
        setMenuError("");
        
        const code = Math.random().toString(36).substring(2, 6).toUpperCase();
        try {
          await setDoc(doc(db, 'rooms', code), {
            hostId: user.uid,
            status: 'waiting',
            players: [{ id: user.uid, name: playerName, hand: [], hasIceBroken: false, isBot: false }],
            board: [],
            deck: [],
            turn: 0,
            difficulty,
            createdAt: new Date().toISOString()
          });
          setRoomId(code);
          setGameState('lobby');
        } catch (e) {
          setMenuError("建立房間失敗：" + e.message + "。請確認資料庫規則是否開放。");
        } finally {
          setIsProcessing(false);
        }
      };

      const handleJoinRoom = async () => {
        const code = joinCode.trim().toUpperCase();
        if (!code || !playerName.trim()) { setMenuError("請輸入暱稱與代碼"); return; }
        setIsProcessing(true);
        try {
          const snap = await getDoc(doc(db, 'rooms', code));
          if (!snap.exists()) throw new Error("找不到該房間");
          const data = snap.data();
          if (data.status !== 'waiting') throw new Error("遊戲已開始");
          const newPlayers = [...data.players, { id: user.uid, name: playerName, hand: [], hasIceBroken: false, isBot: false }];
          await updateDoc(doc(db, 'rooms', code), { players: newPlayers });
          setRoomId(code);
          setGameState('lobby');
        } catch (e) { setMenuError(e.message); }
        finally { setIsProcessing(false); }
      };

      const handleAddBot = async () => {
        if (!roomData || roomData.players.length >= 4) return;
        const newPlayers = [...roomData.players, {
          id: 'bot_' + Date.now(),
          name: `電腦 ${roomData.players.filter(p=>p.isBot).length + 1}`,
          hand: [],
          hasIceBroken: false,
          isBot: true
        }];
        await updateDoc(doc(db, 'rooms', roomId), { players: newPlayers });
      };

      const handleStartGame = async () => {
        const deck = generateDeck();
        const players = roomData.players.map(p => ({
          ...p,
          hand: deck.splice(0, 14),
          hasIceBroken: false
        }));
        await updateDoc(doc(db, 'rooms', roomId), {
          status: 'playing',
          players,
          deck,
          board: [],
          turn: 0
        });
      };

      // --- 遊戲中操作 ---
      const handleEndTurn = async () => {
        if (staging.length > 0) return;
        const meIdx = roomData.players.findIndex(p => p.id === user.uid);
        const me = roomData.players[meIdx];
        const newPlayers = [...roomData.players];
        newPlayers[meIdx] = { ...me, hand: localHand };
        
        await updateDoc(doc(db, 'rooms', roomId), {
          players: newPlayers,
          board: localBoard,
          turn: (roomData.turn + 1) % roomData.players.length
        });
      };

      if (gameState === 'auth') return <div className="h-screen flex items-center justify-center font-bold text-stone-400">正在連線伺服器...</div>;

      return (
        <div className="h-[100dvh] max-w-lg mx-auto bg-stone-200 relative overflow-hidden flex flex-col shadow-2xl">
          
          {gameState === 'menu' && (
            <div className="flex-1 flex flex-col items-center justify-center p-6 bg-stone-100">
              <div className="bg-white p-8 rounded-3xl w-full card-shadow text-center">
                <h1 className="text-4xl font-black text-stone-800 mb-2">行動拉密</h1>
                <p className="text-stone-400 text-sm mb-8 font-bold">多人連線對戰版</p>
                
                {menuError && <div className="mb-6 p-4 bg-red-50 text-red-600 text-xs font-bold rounded-xl border border-red-100 leading-relaxed text-left">{menuError}</div>}
                
                <div className="text-left mb-6">
                  <label className="text-xs font-black text-stone-400 ml-2 uppercase tracking-widest">玩家暱稱</label>
                  <input type="text" value={playerName} onChange={e=>setPlayerName(e.target.value)} placeholder="輸入你的大名" className="w-full mt-1 px-4 py-3 bg-stone-50 border-2 border-stone-100 rounded-2xl outline-none focus:border-blue-500 font-bold" />
                </div>

                <div className="mb-8">
                   <label className="text-xs font-black text-stone-400 uppercase tracking-widest block text-left ml-2 mb-2">電腦難度</label>
                   <div className="flex gap-2">
                     {['easy', 'medium', 'hard'].map(d => (
                       <button key={d} onClick={()=>setDifficulty(d)} className={`flex-1 py-2 rounded-xl font-bold text-xs transition-all ${difficulty === d ? 'bg-stone-800 text-white shadow-lg scale-105' : 'bg-stone-100 text-stone-400'}`}>
                         {d === 'easy' ? '簡單' : d === 'medium' ? '普通' : '困難'}
                       </button>
                     ))}
                   </div>
                </div>

                <button disabled={isProcessing} onClick={handleCreateRoom} className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-transform disabled:bg-stone-300">
                  {isProcessing ? '建立中...' : '建立新房間 (當房主)'}
                </button>

                <div className="my-6 flex items-center gap-4">
                  <div className="h-px bg-stone-200 flex-1"></div>
                  <span className="text-xs font-bold text-stone-300">或者加入房間</span>
                  <div className="h-px bg-stone-200 flex-1"></div>
                </div>

                <div className="flex gap-2">
                  <input type="text" value={joinCode} onChange={e=>setJoinCode(e.target.value)} placeholder="輸入房號" className="flex-1 px-4 py-3 bg-stone-50 border-2 border-stone-100 rounded-2xl text-center font-mono font-bold uppercase" maxLength={4} />
                  <button onClick={handleJoinRoom} className="px-6 py-3 bg-emerald-500 text-white font-black rounded-2xl shadow-md active:scale-95 transition-transform">加入</button>
                </div>
              </div>
            </div>
          )}

          {gameState === 'lobby' && (
            <div className="flex-1 flex flex-col items-center justify-center p-6 bg-stone-100">
              <div className="bg-white p-8 rounded-3xl w-full card-shadow text-center">
                <button onClick={()=>setRoomId('')} className="text-stone-300 text-sm font-bold mb-4 block underline">← 離開房間</button>
                <p className="text-xs font-black text-stone-300 uppercase tracking-widest mb-1">房間代碼</p>
                <div className="text-6xl font-black text-blue-600 tracking-tighter mb-8 font-mono">{roomId}</div>
                
                <div className="text-left mb-8">
                  <div className="flex justify-between items-end mb-3 border-b-2 border-stone-50 pb-2">
                    <span className="text-sm font-black text-stone-400">已加入玩家 ({roomData?.players.length}/4)</span>
                  </div>
                  <div className="space-y-2">
                    {roomData?.players.map(p => (
                      <div key={p.id} className="flex justify-between items-center bg-stone-50 px-4 py-3 rounded-2xl">
                        <span className="font-bold text-stone-700">{p.isBot ? '🤖' : '👤'} {p.name} {p.id === roomData.hostId ? '👑' : ''}</span>
                        {roomData.hostId === user.uid && p.id !== user.uid && <button className="text-red-300 text-xs font-bold">移除</button>}
                      </div>
                    ))}
                    {roomData?.hostId === user.uid && roomData.players.length < 4 && (
                      <button onClick={handleAddBot} className="w-full py-3 border-2 border-dashed border-stone-200 rounded-2xl text-stone-300 font-bold text-sm">+ 加入電腦對手</button>
                    )}
                  </div>
                </div>

                {roomData?.hostId === user.uid ? (
                  <button onClick={handleStartGame} className="w-full py-4 bg-emerald-500 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-transform">開始遊戲</button>
                ) : (
                  <div className="py-4 bg-stone-50 rounded-2xl text-stone-400 font-bold animate-pulse text-sm">等待房主開始...</div>
                )}
              </div>
            </div>
          )}

          {gameState === 'playing' && roomData && (
             <div className="flex-1 flex flex-col">
                <div className="bg-stone-800 text-white p-3 flex justify-between items-center shrink-0">
                   <div className="flex gap-2 overflow-x-auto hide-scrollbar">
                      {roomData.players.map((p, i) => (
                        <div key={p.id} className={`px-2 py-1 rounded-lg text-[10px] whitespace-nowrap font-bold ${roomData.turn === i ? 'bg-yellow-500 text-black ring-2 ring-white' : 'bg-stone-700 text-stone-400'}`}>
                           {p.name}: {p.hand.length}
                        </div>
                      ))}
                   </div>
                   <div className="text-[10px] font-black text-stone-500">DECK: {roomData.deck.length}</div>
                </div>
                
                <div className="flex-1 p-4 overflow-y-auto">
                   <div className="flex flex-wrap gap-4 justify-center">
                      {localBoard.map((set, idx) => (
                        <div key={idx} className="flex gap-1 p-2 bg-white/50 rounded-xl border-2 border-stone-300">
                           {set.map(t => <Tile key={t.id} tile={t} />)}
                        </div>
                      ))}
                   </div>
                </div>

                <div className="bg-white border-t-2 border-stone-300 p-4 shrink-0">
                   <div className="flex justify-between items-center mb-4">
                      <span className="text-[10px] font-black text-stone-400 uppercase tracking-widest">我的手牌 ({localHand.length})</span>
                      {roomData.players[roomData.turn]?.id === user.uid && (
                        <button onClick={handleEndTurn} className="px-6 py-2 bg-blue-600 text-white font-black rounded-xl text-xs shadow-md">確認出牌</button>
                      )}
                   </div>
                   <div className="flex flex-wrap gap-1 justify-center max-h-40 overflow-y-auto">
                      {localHand.map(t => <Tile key={t.id} tile={t} onClick={() => {
                        if(roomData.players[roomData.turn]?.id === user.uid) {
                          setLocalHand(localHand.filter(x => x.id !== t.id));
                        }
                      }} />)}
                   </div>
                </div>
             </div>
          )}

        </div>
      );
    }

    // --- 初始化入口 ---
    function Main() {
      const [ready, setReady] = useState(false);
      const [app, setApp] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        // 捕捉全域錯誤並顯示在 UI
        window.onerror = (msg) => setError(msg);

        const init = () => {
          if (!window.FirebaseModules) return;
          const { initializeApp, getApps, getApp } = window.FirebaseModules;
          try {
            const currentApp = getApps().length > 0 ? getApp() : initializeApp(MY_FIREBASE_CONFIG);
            setApp(currentApp);
            setReady(true);
          } catch(e) { 
            console.error(e);
            setError("Firebase 初始化失敗，請檢查設定代碼是否正確。");
          }
        };
        if (window.FirebaseModules) init();
        else window.addEventListener('firebaseModulesReady', init);
      }, []);

      if (error) return (
        <div className="h-screen flex items-center justify-center p-6 bg-stone-100">
           <div className="bg-white p-6 rounded-2xl border-2 border-red-100 shadow-xl">
             <h2 className="text-red-500 font-black mb-2">發生錯誤</h2>
             <p className="text-stone-600 text-sm leading-relaxed font-bold">{error}</p>
             <button onClick={()=>window.location.reload()} className="mt-4 px-4 py-2 bg-stone-800 text-white rounded-xl text-xs">重新整理</button>
           </div>
        </div>
      );

      return ready ? <App fbApp={app} /> : <div className="h-screen flex items-center justify-center font-bold text-stone-400">正在同步雲端模組...</div>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Main />);
  </script>
</body>
</html>
