<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>行動拉密 多人連線版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 載入 Realtime Database 模組 -->
  <script type="module">
    import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getDatabase, ref, set, get, update, onValue, remove } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js';

    window.FirebaseModules = {
      initializeApp, getApps, getApp, getAuth, signInAnonymously, onAuthStateChanged,
      getDatabase, ref, set, get, update, onValue, remove
    };
    window.dispatchEvent(new Event('firebaseModulesReady'));
  </script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes pulse-ring {
      0% { transform: scale(.8); opacity: 0.5; }
      100% { transform: scale(1.2); opacity: 0; }
    }
    .hint-pulse::before {
      content: ''; display: block; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      border: 4px solid #4ade80; border-radius: inherit; animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }
    .card-shadow { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-stone-200 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ==========================================
    // 你的專屬 Firebase 設定
    // ==========================================
    const MY_FIREBASE_CONFIG = {
      apiKey: "AIzaSyB-JKAKg3SRs60w6n4z6QA94V33RCBfvfM",
      authDomain: "rummikub-a2452.firebaseapp.com",
      databaseURL: "https://rummikub-a2452-default-rtdb.firebaseio.com",
      projectId: "rummikub-a2452",
      storageBucket: "rummikub-a2452.firebasestorage.app",
      messagingSenderId: "944905371953",
      appId: "1:944905371953:web:4318dd2c1274641bffb010",
      measurementId: "G-0M2EJ9FTQ3"
    };

    // --- 遊戲邏輯函式 ---
    const COLORS = ['text-red-600', 'text-blue-600', 'text-gray-900', 'text-yellow-600'];
    const BORDER_COLORS = ['border-red-600', 'border-blue-600', 'border-gray-900', 'border-yellow-600'];

    const generateDeck = () => {
      let newDeck = [];
      let idCounter = 1;
      for (let set = 0; set < 2; set++) {
        for (let cIdx = 0; cIdx < 4; cIdx++) {
          for (let value = 1; value <= 13; value++) {
            newDeck.push({ id: idCounter++, colorIdx: cIdx, value, isJoker: false });
          }
        }
      }
      newDeck.push({ id: idCounter++, value: '☻', colorIdx: -1, isJoker: true });
      newDeck.push({ id: idCounter++, value: '☻', colorIdx: -1, isJoker: true });
      for (let i = newDeck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
      }
      return newDeck;
    };

    const isValidSet = (tiles) => {
      if (!tiles || tiles.length < 3) return false;
      const regulars = tiles.filter(t => !t.isJoker);
      if (regulars.length === 0) return true;
      if (regulars.length === 1) return true;
      
      const isGroup = () => {
        if (tiles.length > 4) return false;
        const val = regulars[0].value;
        const colors = new Set();
        for (let t of regulars) {
          if (t.value !== val || colors.has(t.colorIdx)) return false;
          colors.add(t.colorIdx);
        }
        return true;
      };

      const isRun = () => {
        const color = regulars[0].colorIdx;
        if (regulars.some(t => t.colorIdx !== color)) return false;
        for (let start = 1; start <= 14 - tiles.length; start++) {
          let possible = true, tempJokers = tiles.filter(t => t.isJoker).length;
          for (let i = 0; i < tiles.length; i++) {
            let target = start + i;
            if (!tiles.some(t => !t.isJoker && t.value === target)) {
              if (tempJokers > 0) tempJokers--; else { possible = false; break; }
            }
          }
          if (possible) return true;
        }
        return false;
      };
      return isGroup() || isRun();
    };

    const getSetValue = (tiles) => {
      if (!isValidSet(tiles)) return 0;
      const regulars = tiles.filter(t => !t.isJoker);
      if (regulars.length === 0) return 30; // 若全為百搭牌，當作過關
      
      const isGroup = regulars.every(t => t.value === regulars[0].value);
      if (isGroup) {
        return regulars[0].value * tiles.length;
      } else {
        const firstRegIdx = tiles.findIndex(t => !t.isJoker);
        const startVal = regulars[0].value - firstRegIdx;
        let sum = 0;
        for (let i = 0; i < tiles.length; i++) {
           sum += (startVal + i);
        }
        return sum;
      }
    };

    const sortTiles = (tiles) => {
      if (!tiles) return [];
      const regulars = tiles.filter(t => !t.isJoker);
      const jokers = [...tiles.filter(t => t.isJoker)];
      if (regulars.length <= 1) return [...regulars, ...jokers];
      
      if (regulars.length >= 2 && regulars[0].value === regulars[1].value) {
        return [...regulars.sort((a,b) => a.colorIdx - b.colorIdx), ...jokers];
      }

      regulars.sort((a,b) => a.value - b.value);
      
      let sorted = [];
      let expectedVal = regulars[0].value;
      let regIdx = 0;
      
      if (jokers.length === 0) return regulars;

      while (regIdx < regulars.length) {
        if (regulars[regIdx].value === expectedVal) {
          sorted.push(regulars[regIdx]);
          expectedVal++;
          regIdx++;
        } else if (regulars[regIdx].value < expectedVal) {
          sorted.push(regulars[regIdx]);
          regIdx++;
        } else {
          if (jokers.length > 0) {
            sorted.push(jokers.pop());
            expectedVal++;
          } else {
            sorted.push(regulars[regIdx]);
            expectedVal = regulars[regIdx].value + 1;
            regIdx++;
          }
        }
      }
      
      while (jokers.length > 0) {
        if (expectedVal <= 13) {
          sorted.push(jokers.pop());
          expectedVal++;
        } else {
          sorted.unshift(jokers.pop());
        }
      }
      
      return sorted;
    };

    const findValidSetsFromHand = (handTiles) => {
      let foundSets = [];
      let regulars = [...handTiles.filter(t => !t.isJoker)];
      const valMap = {};
      regulars.forEach(t => { if(!valMap[t.value]) valMap[t.value]=[]; valMap[t.value].push(t); });
      for (let v in valMap) {
        let colors = new Set(), group = [];
        valMap[v].forEach(t => { if(!colors.has(t.colorIdx)) { colors.add(t.colorIdx); group.push(t); } });
        if (group.length >= 3) { foundSets.push(group); group.forEach(gt => { let i = regulars.findIndex(r => r.id === gt.id); if(i>-1) regulars.splice(i,1); }); }
      }
      const colMap = {};
      regulars.forEach(t => { if(!colMap[t.colorIdx]) colMap[t.colorIdx]=[]; colMap[t.colorIdx].push(t); });
      for (let c in colMap) {
        let col = colMap[c].sort((a,b) => a.value - b.value), run = [];
        for (let i=0; i<col.length; i++) {
          if (run.length === 0 || col[i].value === run[run.length-1].value + 1) run.push(col[i]);
          else { if (run.length >= 3) foundSets.push([...run]); run = [col[i]]; }
        }
        if (run.length >= 3) foundSets.push(run);
      }
      return foundSets;
    };

    // --- UI 元件 ---
    const Tile = ({ tile, onClick, isStaged, invalid }) => {
      const colorClass = tile.isJoker ? 'text-purple-600' : COLORS[tile.colorIdx];
      const borderClass = tile.isJoker ? 'border-purple-600' : BORDER_COLORS[tile.colorIdx];
      return (
        <div 
          onClick={onClick} 
          className={`relative flex items-center justify-center shrink-0 w-9 h-12 sm:w-11 sm:h-16 bg-white rounded shadow border-2 cursor-pointer font-bold transform transition-transform active:scale-95 ${borderClass} ${isStaged ? 'opacity-40 scale-90' : ''} ${invalid ? 'bg-red-50 border-red-500' : ''}`}
        >
          <span className={`text-xl sm:text-2xl ${colorClass}`}>{tile.value}</span>
        </div>
      );
    };

    function App({ fbApp }) {
      const { getAuth, signInAnonymously, onAuthStateChanged, getDatabase, ref, set, get, update, onValue } = window.FirebaseModules;
      
      const [user, setUser] = useState(null);
      const [playerName, setPlayerName] = useState('');
      const [roomId, setRoomId] = useState('');
      const [roomData, setRoomData] = useState(null);
      const [gameState, setGameState] = useState('auth');
      const [isProcessing, setIsProcessing] = useState(false);
      
      const [difficulty, setDifficulty] = useState('hard');
      const [useIceBreaking, setUseIceBreaking] = useState(true); 
      
      const [menuError, setMenuError] = useState('');
      const [joinCode, setJoinCode] = useState('');

      const [localHand, setLocalHand] = useState([]);
      const [localBoard, setLocalBoard] = useState([]);
      const [staging, setStaging] = useState([]);
      const [backupHand, setBackupHand] = useState([]);
      const [backupBoard, setBackupBoard] = useState([]);
      const [message, setMessage] = useState('');
      
      const [timeLeft, setTimeLeft] = useState(60); 
      const [showRulesModal, setShowRulesModal] = useState(false); // 遊戲規則視窗狀態

      const db = useMemo(() => getDatabase(fbApp), [fbApp]);
      const auth = useMemo(() => getAuth(fbApp), [fbApp]);

      useEffect(() => {
        return onAuthStateChanged(auth, (u) => {
          if (u) { setUser(u); setGameState('menu'); }
          else { signInAnonymously(auth).catch(e => setMenuError("連線失敗：" + e.message)); }
        });
      }, [auth]);

      useEffect(() => {
        if (!roomId) return;
        return onValue(ref(db, 'rooms/' + roomId), (snap) => {
          if (snap.exists()) {
            const data = snap.val();
            setRoomData(data);
            if (data.status === 'playing' && gameState !== 'playing') setGameState('playing');
            if (data.status === 'gameover' && gameState !== 'gameover') setGameState('gameover');
          } else { setGameState('menu'); setRoomId(''); }
        });
      }, [roomId, db]);

      useEffect(() => {
        if (gameState === 'playing' && roomData) {
          const me = (roomData.players || []).find(p => p.id === user.uid);
          if (me) { setLocalHand(me.hand || []); setBackupHand(me.hand || []); }
          setLocalBoard(roomData.board || []); setBackupBoard(roomData.board || []);
          setStaging([]);
          setTimeLeft(60); 
        }
      }, [roomData?.turn, gameState === 'playing', roomData?.status]);

      useEffect(() => {
        if (gameState !== 'playing' || roomData?.status !== 'playing') return;
        if (roomData.players[roomData.turn]?.isBot) return; 
        
        const timer = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(timer);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, [roomData?.turn, gameState, roomData?.status]);

      useEffect(() => {
        if (timeLeft === 0 && roomData?.players[roomData.turn]?.id === user.uid) {
           handleTimeout();
        }
      }, [timeLeft]);

      const checkStalemate = async (players, board, deck) => {
        let minScore = Infinity;
        let winnerId = null;
        players.forEach(p => {
           let score = (p.hand || []).reduce((sum, t) => sum + (t.isJoker ? 30 : t.value), 0);
           if (score < minScore) { minScore = score; winnerId = p.id; }
        });
        await update(ref(db, 'rooms/' + roomId), {
           players: players,
           board: board,
           status: 'gameover',
           winnerId: winnerId,
           isStalemate: true
        });
      };

      const handleTimeout = async () => {
         const isModified = JSON.stringify(localBoard) !== JSON.stringify(backupBoard) || localHand.length !== backupHand.length || staging.length > 0;
         let finalHand = [...backupHand];
         let newBoard = JSON.parse(JSON.stringify(backupBoard));
         let deckCopy = roomData.deck ? [...roomData.deck] : [];
         
         if (isModified) {
            for(let i=0; i<3; i++) {
               if (deckCopy.length > 0) finalHand.push(deckCopy.pop());
            }
            setMessage("時間到！桌面未完成合法重組，已重設並罰抽 3 張牌。");
         } else {
            if (deckCopy.length > 0) finalHand.push(deckCopy.pop());
            setMessage("時間到！自動抽一張牌並結束回合。");
         }

         const meIdx = roomData.players.findIndex(p => p.id === user.uid);
         const newPlayers = roomData.players.map((p, i) => i === meIdx ? { ...p, hand: finalHand } : p);
         let newPassCount = isModified ? 0 : (roomData.passCount || 0) + 1;
         
         if (deckCopy.length === 0 && newPassCount >= roomData.players.length) {
            await checkStalemate(newPlayers, newBoard, deckCopy);
            return;
         }

         await update(ref(db, 'rooms/' + roomId), {
            players: newPlayers,
            board: newBoard,
            deck: deckCopy,
            turn: (roomData.turn + 1) % roomData.players.length,
            passCount: newPassCount
         });
         
         setLocalHand(finalHand);
         setLocalBoard(newBoard);
         setStaging([]);
      };

      useEffect(() => {
        if (gameState === 'playing' && roomData?.status === 'playing' && roomData.players[roomData.turn]?.isBot && roomData.hostId === user.uid) {
          const botTimer = setTimeout(async () => {
            const bot = roomData.players[roomData.turn];
            let newBoard = roomData.board ? JSON.parse(JSON.stringify(roomData.board)) : [];
            let newHand = [...(bot.hand || [])];
            let playedSomething = false;

            const foundSets = findValidSetsFromHand(newHand);
            if (foundSets.length > 0) {
              const score = foundSets.reduce((s, set) => s + getSetValue(set), 0);
              if (bot.hasIceBroken || score >= 30) {
                foundSets.forEach(s => {
                  newBoard.push(sortTiles(s));
                  s.forEach(t => { const idx = newHand.findIndex(h => h.id === t.id); if(idx > -1) newHand.splice(idx, 1); });
                });
                playedSomething = true;
              }
            }

            if ((bot.hasIceBroken || playedSomething)) {
              let changed = true;
              while (changed) {
                changed = false;
                for (let i = newHand.length - 1; i >= 0; i--) {
                  const tile = newHand[i];
                  for (let bIdx = 0; bIdx < newBoard.length; bIdx++) {
                    const testSet = [...newBoard[bIdx], tile];
                    if (isValidSet(testSet)) {
                      newBoard[bIdx] = sortTiles(testSet);
                      newHand.splice(i, 1);
                      changed = true; playedSomething = true;
                      break;
                    }
                  }
                }
              }
            }

            let deckCopy = roomData.deck ? [...roomData.deck] : [];
            if (!playedSomething && deckCopy.length > 0) {
              newHand.push(deckCopy.pop());
            }

            const updatedPlayers = roomData.players.map((p, i) => 
              i === roomData.turn ? { ...p, hand: newHand, hasIceBroken: bot.hasIceBroken || playedSomething } : p
            );

            if (newHand.length === 0) {
              await update(ref(db, 'rooms/' + roomId), {
                players: updatedPlayers, board: newBoard, status: 'gameover', winnerId: bot.id
              });
              return;
            }

            let newPassCount = playedSomething ? 0 : (roomData.passCount || 0) + 1;
            if (deckCopy.length === 0 && newPassCount >= roomData.players.length) {
              await checkStalemate(updatedPlayers, newBoard, deckCopy);
              return;
            }

            await update(ref(db, 'rooms/' + roomId), {
              players: updatedPlayers,
              board: newBoard,
              deck: deckCopy,
              turn: (roomData.turn + 1) % roomData.players.length,
              passCount: newPassCount
            });
          }, 2500);
          return () => clearTimeout(botTimer);
        }
      }, [roomData?.turn, gameState, user?.uid]);

      // --- 功能處理 ---
      const handleCreateRoom = async () => {
        if (!playerName.trim() || isProcessing) return;
        setIsProcessing(true); setMenuError('');
        const code = Math.random().toString(36).substring(2, 6).toUpperCase();
        try {
          await set(ref(db, 'rooms/' + code), {
            hostId: user.uid, status: 'waiting', difficulty, useIceBreaking,
            players: [{ id: user.uid, name: playerName, hand: [], hasIceBroken: !useIceBreaking, isBot: false }],
            board: [], deck: [], turn: 0, passCount: 0, createdAt: new Date().toISOString()
          });
          setRoomId(code); setGameState('lobby');
        } catch (e) { setMenuError(e.message); }
        finally { setIsProcessing(false); }
      };

      const handleJoinRoom = async () => {
        const code = joinCode.trim().toUpperCase();
        if (!code || !playerName.trim() || isProcessing) return;
        setIsProcessing(true);
        try {
          const snap = await get(ref(db, 'rooms/' + code));
          if (!snap.exists()) throw new Error("房號不存在");
          const data = snap.val();
          const players = data.players || [];
          if (players.length >= 4) throw new Error("房間已滿");
          
          await update(ref(db, 'rooms/' + code), { 
            players: [...players, { id: user.uid, name: playerName, hand: [], hasIceBroken: !data.useIceBreaking, isBot: false }] 
          });
          setRoomId(code); setGameState('lobby');
        } catch (e) { setMenuError(e.message); }
        finally { setIsProcessing(false); }
      };

      const handleAddBot = async () => {
        if (!roomData || (roomData.players || []).length >= 4) return;
        const players = roomData.players || [];
        const newPlayers = [...players, {
          id: 'bot_' + Date.now(),
          name: `電腦 ${players.filter(p=>p.isBot).length + 1}`,
          hand: [], hasIceBroken: !roomData.useIceBreaking, isBot: true
        }];
        await update(ref(db, 'rooms/' + roomId), { players: newPlayers });
      };

      const handleStartGame = async () => {
        const deck = generateDeck();
        const players = roomData.players.map(p => ({ ...p, hand: deck.splice(0, 14), hasIceBroken: !roomData.useIceBreaking }));
        await update(ref(db, 'rooms/' + roomId), { 
           status: 'playing', players, deck, board: [], turn: 0, passCount: 0, isStalemate: false, winnerId: null 
        });
      };

      const handleHandClick = (t) => {
        if (roomData.players[roomData.turn]?.id !== user.uid) return;
        setLocalHand(localHand.filter(x => x.id !== t.id));
        setStaging([...staging, { ...t, source: 'hand' }]);
      };

      const handleBoardClick = (idx, t) => {
        if (roomData.players[roomData.turn]?.id !== user.uid) return;
        const me = roomData.players.find(p => p.id === user.uid);
        if (!me?.hasIceBroken) { setMessage("需先破冰才能拆解桌面"); return; }
        
        const newBoard = [...localBoard];
        const targetSet = newBoard[idx];
        const tileIdx = targetSet.findIndex(x => x.id === t.id);
        
        const removedTile = targetSet[tileIdx];
        const leftPart = targetSet.slice(0, tileIdx);
        const rightPart = targetSet.slice(tileIdx + 1);
        
        newBoard.splice(idx, 1);
        let insertIdx = idx;
        if (leftPart.length > 0) {
          newBoard.splice(insertIdx, 0, leftPart);
          insertIdx++;
        }
        if (rightPart.length > 0) {
          newBoard.splice(insertIdx, 0, rightPart);
        }
        
        setLocalBoard(newBoard);
        setStaging([...staging, { ...removedTile, source: 'board' }]);
      };

      const handleFormNewSet = () => {
        if (staging.length < 3) { setMessage("至少需3張牌"); return; }
        const cleanSet = staging.map(s => { const {source, ...rest} = s; return rest; });
        setLocalBoard([...localBoard, sortTiles(cleanSet)]);
        setStaging([]);
      };

      const handleAddToSet = (idx) => {
        const cleanStaging = staging.map(s => { const {source, ...rest} = s; return rest; });
        const newBoard = [...localBoard];
        newBoard[idx] = sortTiles([...newBoard[idx], ...cleanStaging]);
        setLocalBoard(newBoard);
        setStaging([]);
      };

      const handleSortHand = (type) => {
        let sortedHand = [...localHand];
        if (type === 'number') {
          sortedHand.sort((a, b) => a.value - b.value || a.colorIdx - b.colorIdx);
        } else if (type === 'color') {
          sortedHand.sort((a, b) => a.colorIdx - b.colorIdx || (a.value === '☻' ? 99 : a.value) - (b.value === '☻' ? 99 : b.value));
        }
        setLocalHand(sortedHand);
        
        if (roomData && roomData.players[roomData.turn]?.id !== user.uid) {
           const newPlayers = [...roomData.players];
           const myIdx = newPlayers.findIndex(p => p.id === user.uid);
           if (myIdx > -1) {
              newPlayers[myIdx].hand = sortedHand;
              update(ref(db, 'rooms/' + roomId), { players: newPlayers }).catch(() => {});
           }
        }
      };

      const handleEndTurn = async () => {
        if (staging.length > 0) { setMessage("暫存區還有牌！請建立新組或塞回桌面。"); return; }
        if (localBoard.some(s => !isValidSet(s))) { setMessage("桌上有無效組合！"); return; }
        
        const meIdx = roomData.players.findIndex(p => p.id === user.uid);
        const me = roomData.players[meIdx];
        let finalHand = [...localHand], finalIce = me.hasIceBroken;
        const deckCopy = roomData.deck ? [...roomData.deck] : [];
        const isModified = JSON.stringify(localBoard) !== JSON.stringify(backupBoard) || localHand.length !== backupHand.length;

        if (!finalIce) {
          const score = localBoard.reduce((s, set) => s + getSetValue(set), 0) - (backupBoard || []).reduce((s, b) => s + getSetValue(b), 0);
          if (score >= 30) finalIce = true;
          else if (isModified) { setMessage("破冰總合需滿30分！請重設。"); return; }
        }

        let newPassCount = roomData.passCount || 0;
        if (!isModified) {
           if (deckCopy.length > 0) finalHand.push(deckCopy.pop());
           newPassCount += 1;
        } else {
           newPassCount = 0;
        }

        const newPlayers = roomData.players.map((p, i) => i === meIdx ? { ...p, hand: finalHand, hasIceBroken: finalIce } : p);
        
        if (finalHand.length === 0) {
          await update(ref(db, 'rooms/' + roomId), {
            players: newPlayers, board: localBoard, status: 'gameover', winnerId: user.uid
          });
          setMessage('');
          return;
        }

        if (deckCopy.length === 0 && newPassCount >= roomData.players.length) {
          await checkStalemate(newPlayers, localBoard, deckCopy);
          return;
        }

        await update(ref(db, 'rooms/' + roomId), {
          players: newPlayers,
          board: localBoard,
          deck: deckCopy,
          turn: (roomData.turn + 1) % roomData.players.length,
          passCount: newPassCount
        });
        setMessage('');
      };

      if (gameState === 'auth') return <div className="h-screen flex items-center justify-center font-bold text-stone-400">正在準備環境...</div>;

      return (
        <div className="h-[100dvh] max-w-lg mx-auto bg-stone-200 relative overflow-hidden flex flex-col shadow-2xl">
          
          {/* 遊戲說明彈出視窗 */}
          {showRulesModal && (
            <div className="absolute inset-0 bg-black/60 flex items-center justify-center z-[200] p-4">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[85vh] flex flex-col">
                <div className="p-6 border-b-2 border-stone-100 flex justify-between items-center shrink-0">
                  <h2 className="text-2xl font-black text-stone-800">輕鬆學拉密</h2>
                  <button onClick={() => setShowRulesModal(false)} className="text-stone-400 font-bold text-2xl hover:text-stone-600 transition-colors">×</button>
                </div>
                <div className="p-6 overflow-y-auto flex-1 text-stone-600 text-sm space-y-6 leading-relaxed text-left">
                  <p>拉密有點像數字版的麻將，規則其實非常簡單，只要記住「3」這個神奇數字就好。誰最先把手上的牌全部出完，誰就是大贏家！</p>
                  
                  <div>
                    <h3 className="font-bold text-stone-800 text-base mb-2">1. 只要記住兩種牌型</h3>
                    <p className="mb-2">不管你怎麼出牌，每次放在桌上的牌，<strong className="text-red-500">最少都要有 3 張湊在一起</strong>才可以喔！</p>
                    <ul className="list-disc pl-5 space-y-2">
                      <li>
                        <strong>雙胞胎組合 (同號碼，不同色)</strong><br/>
                        數字一模一樣，但是顏色必須全部不一樣。<br/>
                        <span className="bg-stone-100 px-1 rounded">可以出：紅7、黑7、藍7 (這樣是 3 張，過關！)</span><br/>
                        <span className="bg-stone-100 px-1 rounded">不可以出：紅7、紅7、藍7 (有兩個紅色，這樣犯規喔！)</span>
                      </li>
                      <li>
                        <strong>爬樓梯組合 (同顏色，連號碼)</strong><br/>
                        顏色全部一樣，而且數字要像是爬樓梯一樣照順序連在一起。<br/>
                        <span className="bg-stone-100 px-1 rounded">可以出：黃3、黃4、黃5 (這樣是 3 張，過關！)</span><br/>
                        <span className="bg-stone-100 px-1 rounded">可以出：藍9、藍10、藍11、藍12 (這樣是 4 張，也過關！)</span>
                      </li>
                    </ul>
                    <p className="mt-2 text-stone-500 bg-stone-50 p-2 rounded-lg text-xs">
                      <strong>小提醒：數字不能繞圈圈</strong><br/>
                      數字 1 是最小的，13 是最大的。順序只能從 1 一路往上排到 13，不能把 1 接在 13 的後面喔 (不可以出 12、13、1)。
                    </p>
                  </div>

                  <div>
                    <h3 className="font-bold text-stone-800 text-base mb-2">2. 遊戲開始的第一步 (破冰)</h3>
                    <p>遊戲剛開始，每個人要第一次把牌打到桌上時，有一個小小的測驗：你第一次打出去的牌，上面的數字加起來必須<strong>剛好或大於 30 分</strong>。例如：你出了一組 紅10、黑10、藍10，加起來是 30，恭喜你過關了！</p>
                    <p className="mt-2">如果你手上的牌湊不到 30 分，別擔心，這回合只能先「確認結束」抽一張牌，等下次有機會再出。只要過了一次 30 分的門檻，以後出牌就再也不用管分數了，想怎麼出就怎麼出！</p>
                  </div>

                  <div>
                    <h3 className="font-bold text-stone-800 text-base mb-2">3. 拉密最好玩的地方：拆牌與接龍</h3>
                    <p>只要你成功「破冰」了，接下來就是發揮創意的時候！你可以隨便拿桌上的牌來接龍。</p>
                    <p className="mt-2">例如桌上已經有別人出的「紅4、紅5、紅6」。如果你手剛好有一張「紅7」，你就可以直接把它接在後面，變成「紅4、紅5、紅6、紅7」。</p>
                    <p className="mt-2">你甚至可以把桌上的牌拆開來，跟自己手上的牌重新組合。只要記得一個大原則：不管你怎麼搬來搬去，最後留在桌上的每一組牌，都還是要維持「至少 3 張」，而且要符合規則喔！</p>
                  </div>

                  <div>
                    <h3 className="font-bold text-stone-800 text-base mb-2">4. 出牌時間與拆牌小規定</h3>
                    <p>為了讓遊戲更順暢，大家每次出牌都有 60 秒的時間可以思考。</p>
                    <ul className="list-disc pl-5 space-y-2 mt-2">
                      <li><strong>想太久沒出牌怎麼辦？</strong> 如果時間到了你都沒有出牌，系統會自動幫你抽一張牌，然後換下一個人。</li>
                      <li><strong>拆牌拼不回去會怎樣？</strong> 把桌上的牌拆開來重新組合非常好玩，但如果在 60 秒結束時，你把桌上的牌弄得亂七八糟拼不回去，系統會幫你把牌全部恢復原狀。作為小小的懲罰，系統會自動罰你多抽 3 張牌喔！所以動手拆牌前可以先在腦海裡想清楚。</li>
                    </ul>
                  </div>

                  <div>
                    <h3 className="font-bold text-stone-800 text-base mb-2">5. 神奇的百搭牌 (笑臉牌)</h3>
                    <p>如果你看到有一張牌畫著笑臉，那可是超級好用的「萬能牌」！缺什麼數字、缺什麼顏色，它都可以變身代替。</p>
                  </div>

                  <div>
                    <h3 className="font-bold text-stone-800 text-base mb-2">6. 怎麼分出勝負？</h3>
                    <p>第一種贏法很簡單：誰最先把手上的牌全部出完，誰就是第一名！</p>
                    <p className="mt-2">第二種情況比較少見：如果大家把共用的牌堆都抽光了，而且每個人也都沒辦法再出牌，這時候遊戲也會結束。系統會把每個人手上的牌數字加起來，數字總和「最小」的人就是贏家！</p>
                    <p className="mt-2 text-stone-500 bg-stone-50 p-2 rounded-lg text-xs">
                      這時候要特別注意，如果你手上還留著沒用掉的笑臉牌，一張會被當成 30 分來計算，分數會變很高喔，所以千萬別把它扣在手裡太久。
                    </p>
                  </div>
                </div>
                <div className="p-4 border-t-2 border-stone-100 shrink-0">
                  <button onClick={() => setShowRulesModal(false)} className="w-full py-4 bg-blue-600 text-white font-black rounded-xl active:scale-95 shadow-md">我準備好啦！</button>
                </div>
              </div>
            </div>
          )}

          {gameState === 'menu' && (
            <div className="flex-1 flex flex-col items-center justify-center p-6 bg-stone-100 overflow-y-auto">
              <div className="bg-white p-8 rounded-3xl w-full card-shadow text-center">
                <h1 className="text-4xl font-black text-stone-800 mb-6">行動拉密</h1>
                {menuError && <div className="mb-4 text-red-500 text-xs font-bold bg-red-50 p-3 rounded-lg border border-red-200">{menuError}</div>}
                
                <input type="text" value={playerName} onChange={e=>setPlayerName(e.target.value)} placeholder="你的暱稱" className="w-full px-4 py-3 border-2 rounded-xl mb-6 outline-none focus:border-blue-500 font-bold text-center" />
                
                <div className="mb-4 flex justify-between items-center bg-stone-50 p-3 rounded-xl border-2 border-stone-100">
                  <span className="text-sm font-bold text-stone-600">破冰規則 (首出需30分)</span>
                  <button onClick={() => setUseIceBreaking(!useIceBreaking)} className={`px-4 py-1.5 rounded-lg font-bold text-xs shadow-sm transition-colors ${useIceBreaking ? 'bg-blue-600 text-white' : 'bg-stone-300 text-stone-600'}`}>
                    {useIceBreaking ? '開啟' : '關閉'}
                  </button>
                </div>

                <div className="mb-8 flex justify-between items-center bg-stone-50 p-3 rounded-xl border-2 border-stone-100">
                  <span className="text-sm font-bold text-stone-600">電腦難度</span>
                  <div className="flex gap-1">
                    {['easy', 'medium', 'hard'].map(d => (
                      <button key={d} onClick={()=>setDifficulty(d)} className={`px-3 py-1.5 rounded-lg font-bold text-xs transition-colors ${difficulty === d ? 'bg-stone-800 text-white shadow-sm' : 'bg-stone-200 text-stone-500'}`}>
                        {d === 'easy' ? '簡單' : d === 'medium' ? '普通' : '困難'}
                      </button>
                    ))}
                  </div>
                </div>

                <button disabled={isProcessing} onClick={handleCreateRoom} className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl shadow-lg active:scale-95 mb-6 disabled:bg-stone-300">
                  {isProcessing ? '處理中...' : '建立新房間 (房主)'}
                </button>
                <div className="flex gap-2 mb-4">
                  <input type="text" value={joinCode} onChange={e=>setJoinCode(e.target.value)} placeholder="代碼" className="flex-1 px-4 py-2 border-2 rounded-xl text-center uppercase font-mono font-bold" maxLength={4} />
                  <button onClick={handleJoinRoom} className="px-6 py-2 bg-emerald-500 text-white font-black rounded-xl shadow active:scale-95">加入</button>
                </div>

                <div className="mt-6 border-t-2 border-stone-100 pt-4">
                  <button onClick={() => setShowRulesModal(true)} className="text-sm font-bold text-blue-600 underline hover:text-blue-800 transition-colors">
                    不知道怎麼玩？點我看超簡單規則
                  </button>
                </div>

              </div>
              
              <div className="mt-8 text-stone-400 text-xs font-bold tracking-widest">
                蕭宇超製作
              </div>
            </div>
          )}

          {gameState === 'lobby' && (
            <div className="flex-1 flex flex-col items-center justify-center p-6 bg-stone-100">
              <div className="bg-white p-8 rounded-3xl w-full card-shadow text-center">
                <button onClick={()=>setRoomId('')} className="text-stone-300 text-xs font-bold mb-4 block underline">← 離開</button>
                <div className="text-5xl font-black text-blue-600 tracking-widest mb-8 font-mono">{roomId}</div>
                <div className="text-left mb-8 space-y-2">
                  {(roomData?.players || []).map(p => (
                    <div key={p.id} className="py-3 px-4 bg-stone-50 rounded-2xl font-bold text-stone-700 flex justify-between">
                      <span>{p.isBot ? '🤖' : '👤'} {p.name} {p.id === roomData.hostId ? '👑' : ''}</span>
                    </div>
                  ))}
                  {roomData?.hostId === user.uid && (roomData.players || []).length < 4 && <button onClick={handleAddBot} className="w-full py-2 border-2 border-dashed rounded-xl text-stone-300 font-bold text-xs">+ 加入電腦</button>}
                </div>
                {roomData?.hostId === user.uid ? (
                  <button onClick={handleStartGame} className="w-full py-4 bg-emerald-500 text-white font-black rounded-2xl shadow-lg">開始遊戲</button>
                ) : <p className="text-stone-400 animate-pulse font-bold">等待房主開始...</p>}
              </div>
            </div>
          )}

          {gameState === 'playing' && roomData && (
             <div className="flex-1 flex flex-col overflow-hidden">
                <div className="bg-stone-800 text-white p-2 flex justify-between items-center shrink-0">
                   <div className="flex gap-2 overflow-x-auto hide-scrollbar flex-1">
                      {roomData.players.map((p, i) => (
                        <div key={p.id} className={`px-2 py-1 rounded-lg text-[10px] whitespace-nowrap font-bold flex items-center gap-1 ${roomData.turn === i ? 'bg-yellow-500 text-black ring-1 ring-white' : 'bg-stone-700'}`}>
                           <span>{p.name}: {p.hand?.length || 0}</span>
                           {roomData.turn === i && !p.isBot && <span className="ml-1 bg-black/20 px-1 rounded font-mono">{timeLeft}s</span>}
                        </div>
                      ))}
                   </div>
                   <div className="text-[10px] font-bold text-stone-500 ml-2">牌堆: {roomData.deck?.length || 0}</div>
                </div>
                
                <div className="flex-1 p-4 overflow-y-auto">
                   {message && <div className="text-center mb-4"><span className="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full text-[10px] font-bold shadow-sm">{message}</span></div>}
                   <div className="flex flex-wrap gap-4 justify-center pb-20">
                      {localBoard.map((set, idx) => {
                        const isValid = isValidSet(set);
                        return (
                          <div key={idx} className={`flex gap-1 p-2 rounded-xl border-2 relative transition-colors ${isValid ? 'bg-white/50 border-stone-300' : 'bg-red-100 border-red-400 shadow-sm'}`}>
                             {set.map(t => <Tile key={t.id} tile={t} onClick={() => handleBoardClick(idx, t)} />)}
                             {roomData.players[roomData.turn]?.id === user.uid && staging.length > 0 && (
                               <button onClick={()=>handleAddToSet(idx)} className="absolute -bottom-6 left-1/2 -translate-x-1/2 bg-blue-500 text-white text-[10px] px-2 py-1 rounded-lg shadow-lg z-10 whitespace-nowrap">+ 塞入</button>
                             )}
                          </div>
                        );
                      })}
                   </div>
                </div>

                {roomData.players[roomData.turn]?.id === user.uid && (
                   <div className="bg-blue-50 border-t-2 border-blue-100 p-3 min-h-[90px] relative flex flex-col items-center shrink-0">
                      <div className="text-[8px] font-black text-blue-300 absolute top-1 left-2 uppercase tracking-widest">暫存區</div>
                      <div className="flex gap-1 overflow-x-auto hide-scrollbar max-w-full mb-2">
                        {staging.map(t => <Tile key={t.id} tile={t} onClick={() => {
                          if(t.source === 'hand') {
                            setLocalHand(sortTiles([...localHand, t]));
                          } else {
                            setLocalBoard([...localBoard, [t]]);
                          }
                          setStaging(staging.filter(x => x.id !== t.id));
                        }} />)}
                      </div>
                      {staging.length >= 3 && <button onClick={handleFormNewSet} className="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-md">建立新牌組</button>}
                   </div>
                )}

                <div className="bg-white border-t-2 border-stone-200 p-4 shrink-0">
                   <div className="flex justify-between items-center mb-3">
                      <span className="text-[10px] font-black text-stone-400 uppercase tracking-widest">
                        {roomData.useIceBreaking === false ? '自由出牌 ✅' : (roomData.players.find(p=>p.id===user.uid)?.hasIceBroken ? '已破冰 ✅' : '未破冰 (需30分)')}
                      </span>
                      
                      <div className="flex gap-2">
                         <button onClick={() => handleSortHand('number')} className="px-2 py-1 bg-stone-100 text-stone-500 rounded-lg text-[10px] font-bold shadow-sm active:scale-95">123排序</button>
                         <button onClick={() => handleSortHand('color')} className="px-2 py-1 bg-stone-100 text-stone-500 rounded-lg text-[10px] font-bold shadow-sm active:scale-95">顏色排序</button>
                         
                         {roomData.players[roomData.turn]?.id === user.uid && (
                           <>
                             <div className="w-px h-6 bg-stone-200 mx-1"></div>
                             <button onClick={()=>{setLocalHand(backupHand); setLocalBoard(backupBoard); setStaging([]); setMessage('已重設');}} className="px-3 py-1 bg-stone-100 text-stone-500 rounded-lg text-[10px] font-bold active:scale-95">重設</button>
                             <button onClick={handleEndTurn} className="px-4 py-1 bg-emerald-500 text-white font-black rounded-lg text-[10px] shadow-md active:scale-95">確認結束</button>
                           </>
                         )}
                      </div>
                   </div>
                   <div className="flex flex-wrap gap-1 justify-center max-h-36 overflow-y-auto">
                      {localHand.map(t => <Tile key={t.id} tile={t} onClick={() => handleHandClick(t)} />)}
                   </div>
                </div>
             </div>
          )}

          {gameState === 'gameover' && roomData?.status === 'gameover' && (
             <div className="absolute inset-0 bg-black/80 flex items-center justify-center z-[100] p-6">
                <div className="bg-white p-8 rounded-3xl text-center shadow-2xl w-full">
                   <h2 className="text-2xl font-black text-stone-800 mb-4">{roomData.isStalemate ? '僵局結束！' : '遊戲結束！'}</h2>
                   <p className="text-stone-500 mb-8 font-bold">
                     {roomData.winnerId === user.uid 
                       ? '恭喜你獲得勝利！' 
                       : `${roomData.players.find(p=>p.id === roomData.winnerId)?.name} 贏得了遊戲！`}
                   </p>
                   
                   {roomData.hostId === user.uid ? (
                     <button onClick={handleStartGame} className="w-full py-4 bg-emerald-500 text-white font-black rounded-2xl shadow-md mb-3">再玩一場</button>
                   ) : (
                     <div className="w-full py-4 bg-stone-100 text-stone-500 font-black rounded-2xl mb-3">等待房主開始新局...</div>
                   )}
                   <button onClick={()=>window.location.reload()} className="w-full py-4 bg-stone-200 text-stone-600 font-black rounded-2xl">回大廳</button>
                </div>
             </div>
          )}
        </div>
      );
    }

    function Main() {
      const [ready, setReady] = useState(false);
      const [app, setApp] = useState(null);
      useEffect(() => {
        const init = () => {
          if (!window.FirebaseModules) return;
          const { initializeApp, getApps, getApp } = window.FirebaseModules;
          try {
            const currentApp = getApps().length > 0 ? getApp() : initializeApp(MY_FIREBASE_CONFIG);
            setApp(currentApp); setReady(true);
          } catch(e) { console.error(e); }
        };
        if (window.FirebaseModules) init();
        else window.addEventListener('firebaseModulesReady', init);
      }, []);
      return ready ? <App fbApp={app} /> : null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Main />);
  </script>
</body>
</html>
